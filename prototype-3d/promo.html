<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>仙劫 · 幸存 — 宣传片</title>
<style>
  :root {
    --ink: #e9ffe9; --jade: #6fe39a; --gold: #ffd166;
    --bg0: #060c0a; --bg1: #0b1712;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg0);
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; color: var(--ink);
    -webkit-user-select: none; user-select: none; }
  #bg { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
  .vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at 50% 46%, rgba(0,0,0,0) 38%, rgba(0,0,0,0.66) 100%); }

  #stage { position: fixed; inset: 0; z-index: 3; display: flex; align-items: center; justify-content: center; }
  .scene { position: absolute; text-align: center; width: min(92vw, 920px);
    opacity: 0; transform: translateY(18px) scale(0.98); transition: opacity .7s ease, transform .7s cubic-bezier(.2,1,.3,1); }
  .scene.show { opacity: 1; transform: translateY(0) scale(1); }

  .kicker { font-size: clamp(12px, 2.4vw, 16px); letter-spacing: .5em; color: var(--jade);
    text-shadow: 0 0 14px rgba(80,220,130,.55); margin-bottom: 18px; padding-left: .5em; }
  .title { font-size: clamp(44px, 11vw, 128px); font-weight: 900; letter-spacing: .12em; line-height: 1.02;
    background: linear-gradient(120deg, #d6ffe6 0%, var(--jade) 42%, var(--gold) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 6px 30px rgba(110,220,150,.35)); }
  .sub { margin-top: 22px; font-size: clamp(15px, 3vw, 26px); opacity: .85; letter-spacing: .18em; }
  .big { font-size: clamp(30px, 7vw, 74px); font-weight: 800; letter-spacing: .1em;
    text-shadow: 0 0 22px rgba(255,180,90,.35); }
  .big .g { color: var(--gold); } .big .j { color: var(--jade); }
  .lead { font-size: clamp(16px, 3.2vw, 30px); letter-spacing: .14em; opacity: .9; }

  /* 技能图标行 */
  .icons { display: flex; flex-wrap: wrap; gap: clamp(10px, 2.5vw, 26px); justify-content: center; margin-bottom: 26px; }
  .ic { width: clamp(48px, 9vw, 84px); height: clamp(48px, 9vw, 84px);
    opacity: 0; transform: translateY(14px) scale(.7); }
  .scene.show .ic { animation: pop .55s cubic-bezier(.2,1.5,.4,1) forwards; }
  .ic:nth-child(1){animation-delay:.05s} .ic:nth-child(2){animation-delay:.13s} .ic:nth-child(3){animation-delay:.21s}
  .ic:nth-child(4){animation-delay:.29s} .ic:nth-child(5){animation-delay:.37s} .ic:nth-child(6){animation-delay:.45s}
  .ic:nth-child(7){animation-delay:.53s} .ic:nth-child(8){animation-delay:.61s}
  @keyframes pop { to { opacity: 1; transform: translateY(0) scale(1); } }
  .ic .bg2 { fill: currentColor; fill-opacity: .12; stroke: currentColor; stroke-opacity: .45; stroke-width: 1; }
  .ic .gl { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 4px currentColor); }

  /* 羁绊标签 */
  .tags { display: flex; flex-wrap: wrap; gap: clamp(8px, 1.8vw, 16px); justify-content: center; margin-bottom: 24px; }
  .tag { font-size: clamp(20px, 4.5vw, 40px); font-weight: 800; width: clamp(44px, 9vw, 76px); height: clamp(44px, 9vw, 76px);
    display: flex; align-items: center; justify-content: center; border-radius: 16px;
    border: 1.5px solid rgba(120,220,150,.3); background: rgba(16,30,22,.7); color: var(--ink);
    opacity: 0; transform: scale(.6); }
  .scene.show .tag { animation: pop .5s cubic-bezier(.2,1.5,.4,1) forwards; }
  .tag.lit { color: #08140d; background: linear-gradient(135deg, var(--jade), var(--gold)); border-color: transparent;
    box-shadow: 0 0 22px rgba(120,220,150,.5); }
  .tags .tag:nth-child(1){animation-delay:.04s}.tags .tag:nth-child(2){animation-delay:.10s}
  .tags .tag:nth-child(3){animation-delay:.16s}.tags .tag:nth-child(4){animation-delay:.22s}
  .tags .tag:nth-child(5){animation-delay:.28s}.tags .tag:nth-child(6){animation-delay:.34s}
  .tags .tag:nth-child(7){animation-delay:.40s}.tags .tag:nth-child(8){animation-delay:.46s}
  .tags .tag:nth-child(9){animation-delay:.52s}

  .cta { display: inline-block; margin-top: 30px; padding: 16px 52px; font-size: clamp(18px, 3.6vw, 28px);
    font-weight: 800; letter-spacing: .22em; color: #08140d; border-radius: 16px;
    background: linear-gradient(135deg, var(--jade), var(--gold)); box-shadow: 0 10px 36px rgba(110,220,150,.4);
    animation: ctaPulse 1.6s ease-in-out infinite; }
  @keyframes ctaPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }
  .store { margin-top: 20px; font-size: clamp(13px, 2.6vw, 18px); letter-spacing: .3em; opacity: .7; }

  .brand { position: fixed; left: 26px; top: 22px; z-index: 4; font-weight: 800; letter-spacing: .2em;
    font-size: 15px; color: var(--jade); text-shadow: 0 0 12px rgba(80,220,130,.5); opacity: .9; }
  .replay { position: fixed; right: 20px; bottom: 16px; z-index: 4; font-size: 12px; letter-spacing: .12em;
    opacity: .45; }
  .progress { position: fixed; left: 0; bottom: 0; height: 3px; z-index: 4; width: 0;
    background: linear-gradient(90deg, var(--jade), var(--gold)); box-shadow: 0 0 10px rgba(120,220,150,.6); }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="vignette"></div>

  <div id="stage">
    <div class="scene" data-dur="3.6">
      <div class="kicker">修 仙 × 幸 存 者 · ROGUELITE</div>
      <div class="title">仙劫 · 幸存</div>
      <div class="sub">万妖来袭，以剑御之</div>
    </div>

    <div class="scene" data-dur="3.4">
      <div class="big"><span class="j">只控走位</span> · <span class="g">法宝自动施法</span></div>
      <div class="sub" style="margin-top:26px">WASD / 摇杆移动，杀机自现</div>
    </div>

    <div class="scene" data-dur="3.8">
      <div class="icons" id="iconRow"></div>
      <div class="lead">十九种法宝形态 · 飞剑 · 掷刀 · 落雷 · 符阵 · 坠星…</div>
    </div>

    <div class="scene" data-dur="3.8">
      <div class="tags" id="tagRow"></div>
      <div class="lead">凑齐标签 · <span style="color:var(--gold)">流派羁绊觉醒</span></div>
    </div>

    <div class="scene" data-dur="4.0">
      <div class="big"><span class="g">万剑诀 · 天雷诛仙 · 囚天大阵</span></div>
      <div class="cta">开 始 历 练</div>
      <div class="store">微 信 小 游 戏 · 即 将 上 线</div>
    </div>
  </div>

  <div class="brand">仙劫·幸存</div>
  <div class="replay">按 R 重播 · 录屏即得宣传片</div>
  <div class="progress" id="prog"></div>

<script>
(function () {
  // ---------- 技能图标字形（与游戏内 icons.ts 同款，挑 8 种代表形态） ----------
  var GLYPH = {
    sword: '<line x1="12" y1="3.5" x2="12" y2="13.5"/><line x1="8.5" y1="13.5" x2="15.5" y2="13.5"/><line x1="12" y1="13.5" x2="12" y2="20.5"/>',
    glaive: '<path d="M6.5 6.5 A9 9 0 1 0 17.8 17.8"/><path d="M8.2 8.2 A6.6 6.6 0 1 0 16 16" opacity="0.5"/><line x1="6.5" y1="6.5" x2="4.2" y2="4.2"/>',
    strike: '<path d="M13.5 3 L7.5 12.5 H11 L9.5 21 L17.5 10 H13.5 Z"/>',
    sigil: '<path d="M12 3.4 L20.6 12 L12 20.6 L3.4 12 Z"/><path d="M12 8 L16 12 L12 16 L8 12 Z" opacity="0.55"/>',
    aura: '<circle cx="12" cy="12" r="2.2"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="8" opacity="0.5"/>',
    bolt: '<circle cx="14.5" cy="11" r="4"/><path d="M10.6 10.6 L4 8.2"/><path d="M10.6 12.4 L4.6 15"/>',
    meteor: '<path d="M16 6.5 l1.3 2.8 2.8 1.3 -2.8 1.3 -1.3 2.8 -1.3 -2.8 -2.8 -1.3 2.8 -1.3 z"/><path d="M11.5 12.5 L4 20"/>',
    boomerang: '<path d="M5 7 L11.6 13.6 Q12 14 12.4 13.6 L19 7"/><path d="M6 9.5 Q12 4.5 18 9.5" opacity="0.4"/>',
  };
  var COLORS = ['#b977ff', '#ff9b3d', '#5aa6ff', '#6fe39a', '#ffd166', '#ff7b9c', '#7be0ff', '#c9ff8a'];
  var order = ['sword','glaive','strike','sigil','aura','bolt','meteor','boomerang'];
  var iconRow = document.getElementById('iconRow');
  order.forEach(function (k, i) {
    iconRow.insertAdjacentHTML('beforeend',
      '<svg class="ic" viewBox="0 0 24 24" style="color:' + COLORS[i % COLORS.length] + '">' +
      '<rect class="bg2" x="1.5" y="1.5" width="21" height="21" rx="6"/>' +
      '<g class="gl">' + GLYPH[k] + '</g></svg>');
  });
  var TAGS = ['剑','刀','仙','魔','妖','体','雷','阵','木'];
  var tagRow = document.getElementById('tagRow');
  TAGS.forEach(function (t, i) {
    tagRow.insertAdjacentHTML('beforeend', '<div class="tag' + (i % 2 === 0 ? ' lit' : '') + '">' + t + '</div>');
  });

  // ---------- 背景：灵气战场粒子模拟（妖群涌入 / 法术清场 / 灵石回收） ----------
  var cv = document.getElementById('bg'), ctx = cv.getContext('2d');
  var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() { W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
  addEventListener('resize', resize); resize();

  var t0 = performance.now(), last = t0;
  var enemies = [], rings = [], blades = [], bolts = [], orbs = [], sparks = [];
  var cast = 0, spawn = 0;
  function cx() { return W / 2 + Math.sin(performance.now() / 1700) * Math.min(W, H) * 0.07; }
  function cy() { return H / 2 + Math.cos(performance.now() / 2100) * Math.min(W, H) * 0.05; }

  function spawnEnemy() {
    var a = Math.random() * Math.PI * 2, r = Math.max(W, H) * 0.62;
    enemies.push({ x: cx() + Math.cos(a) * r, y: cy() + Math.sin(a) * r, hp: 1, s: 0.7 + Math.random() * 0.6 });
  }
  function nova(x, y, R, col) { rings.push({ x: x, y: y, r: 8, R: R, col: col, life: 1 }); }
  function doCast() {
    var px = cx(), py = cy();
    var mode = Math.floor(Math.random() * 4);
    if (mode === 0) { // 阵爆/坠星：范围清场
      var R = Math.min(W, H) * (0.16 + Math.random() * 0.1);
      nova(px, py, R, '#9f7aff');
      enemies.forEach(function (e) { if (Math.hypot(e.x - px, e.y - py) < R) e.hp = 0; });
    } else if (mode === 1) { // 飞剑：八方剑气
      for (var i = 0; i < 8; i++) { var a = i / 8 * Math.PI * 2; blades.push({ x: px, y: py, vx: Math.cos(a) * 7.5, vy: Math.sin(a) * 7.5, life: 1 }); }
    } else if (mode === 2) { // 落雷：点名最近若干
      var picks = enemies.slice().sort(function (a, b) { return Math.hypot(a.x - px, a.y - py) - Math.hypot(b.x - px, b.y - py); }).slice(0, 4);
      picks.forEach(function (e) { bolts.push({ x: e.x, y: e.y, life: 1 }); e.hp = 0; });
    } else { // 妖弹：追踪
      for (var j = 0; j < 5; j++) { var aa = Math.random() * Math.PI * 2; bolts.push({ x: px, y: py, life: 0 }); blades.push({ x: px, y: py, vx: Math.cos(aa) * 5, vy: Math.sin(aa) * 5, life: 1, homing: true }); }
    }
  }

  function step(dt) {
    var px = cx(), py = cy();
    spawn -= dt; if (spawn <= 0) { spawn = 0.06; for (var i = 0; i < 3; i++) spawnEnemy(); }
    cast -= dt; if (cast <= 0) { cast = 0.5 + Math.random() * 0.4; doCast(); }
    if (enemies.length > 420) enemies.splice(0, enemies.length - 420);

    enemies.forEach(function (e) {
      var dx = px - e.x, dy = py - e.y, d = Math.hypot(dx, dy) || 1;
      e.x += dx / d * 60 * e.s * dt; e.y += dy / d * 60 * e.s * dt;
      if (d < 22) e.hp = 0;
    });
    blades.forEach(function (b) {
      if (b.homing) { var dx = px - b.x, dy = py - b.y; } // 仅外观，不必精确
      b.x += b.vx; b.y += b.vy; b.life -= dt * 0.7;
      enemies.forEach(function (e) { if (e.hp > 0 && Math.hypot(e.x - b.x, e.y - b.y) < 16) { e.hp = 0; } });
    });
    rings.forEach(function (r) { r.r += (r.R - r.r) * Math.min(1, dt * 7); r.life -= dt * 1.6; });
    bolts.forEach(function (b) { b.life -= dt * 3.2; });
    sparks.forEach(function (s) { s.x += s.vx; s.y += s.vy; s.vy += 18 * dt; s.life -= dt * 2; });
    orbs.forEach(function (o) { var dx = px - o.x, dy = py - o.y, d = Math.hypot(dx, dy) || 1; o.x += dx / d * 220 * dt; o.y += dy / d * 220 * dt; o.life -= dt * 0.6; if (d < 18) o.life = 0; });

    // 死亡 → 灵石 + 火花
    for (var k = enemies.length - 1; k >= 0; k--) if (enemies[k].hp <= 0) {
      var e = enemies[k];
      if (Math.random() < 0.5) orbs.push({ x: e.x, y: e.y, life: 1 });
      for (var s = 0; s < 3; s++) { var a = Math.random() * Math.PI * 2; sparks.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.4, vy: Math.sin(a) * 2.4 - 1, life: 1 }); }
      enemies.splice(k, 1);
    }
    rings = rings.filter(function (r) { return r.life > 0; });
    blades = blades.filter(function (b) { return b.life > 0 && b.x > -50 && b.x < W + 50 && b.y > -50 && b.y < H + 50; });
    bolts = bolts.filter(function (b) { return b.life > 0; });
    sparks = sparks.filter(function (s) { return s.life > 0; });
    orbs = orbs.filter(function (o) { return o.life > 0; });
  }

  function draw() {
    var px = cx(), py = cy();
    ctx.clearRect(0, 0, W, H);
    // 地面网格辉光
    var g = ctx.createRadialGradient(px, py, 0, px, py, Math.max(W, H) * 0.6);
    g.addColorStop(0, 'rgba(30,60,46,0.55)'); g.addColorStop(1, 'rgba(6,12,10,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';
    // 灵石
    orbs.forEach(function (o) { ctx.fillStyle = 'rgba(255,209,102,' + (0.5 + o.life * 0.5) + ')'; ctx.beginPath(); ctx.arc(o.x, o.y, 3.5, 0, 7); ctx.fill(); });
    // 妖群
    enemies.forEach(function (e) { ctx.fillStyle = 'rgba(220,70,90,0.9)'; ctx.beginPath(); ctx.arc(e.x, e.y, 3.6 * e.s, 0, 7); ctx.fill(); });
    // 飞剑
    ctx.lineWidth = 2.4; ctx.strokeStyle = 'rgba(180,255,210,0.9)';
    blades.forEach(function (b) { ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - b.vx * 1.6, b.y - b.vy * 1.6); ctx.stroke(); });
    // 落雷
    bolts.forEach(function (b) { ctx.strokeStyle = 'rgba(190,232,255,' + Math.max(0, b.life) + ')'; ctx.lineWidth = 2.2; ctx.beginPath(); var x = b.x; ctx.moveTo(x, b.y - 60); for (var i = 1; i <= 6; i++) { ctx.lineTo(x + (Math.random() - 0.5) * 14, b.y - 60 + i * 10); } ctx.stroke(); });
    // 法阵环（外彩环 + 内白环，用 globalAlpha 控淡出）
    rings.forEach(function (r) {
      var a = Math.max(0, r.life);
      ctx.globalAlpha = a; ctx.strokeStyle = r.col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 7); ctx.stroke();
      ctx.globalAlpha = a * 0.5; ctx.strokeStyle = '#ffffff'; ctx.beginPath(); ctx.arc(r.x, r.y, r.r * 0.62, 0, 7); ctx.stroke();
      ctx.globalAlpha = 1;
    });
    // 火花
    sparks.forEach(function (s) { ctx.fillStyle = 'rgba(255,180,120,' + Math.max(0, s.life) + ')'; ctx.fillRect(s.x, s.y, 2.4, 2.4); });
    ctx.globalCompositeOperation = 'source-over';

    // 道修（中心玉点 + 光环）
    ctx.fillStyle = '#9effc4'; ctx.beginPath(); ctx.arc(px, py, 7, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(120,255,180,0.5)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, py, 14 + Math.sin(performance.now() / 240) * 2, 0, 7); ctx.stroke();
  }

  function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000); last = now;
    step(dt); draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- 分场时间线 ----------
  var scenes = Array.prototype.slice.call(document.querySelectorAll('.scene'));
  var prog = document.getElementById('prog');
  var idx = -1, timer = null, total = scenes.reduce(function (a, s) { return a + parseFloat(s.getAttribute('data-dur')); }, 0);
  function show(i) {
    if (idx >= 0) scenes[idx].classList.remove('show');
    idx = i % scenes.length;
    scenes[idx].classList.add('show');
    var dur = parseFloat(scenes[idx].getAttribute('data-dur')) * 1000;
    timer = setTimeout(function () { show(idx + 1); }, dur);
  }
  // 进度条（整轮循环）
  var pStart = performance.now();
  (function pTick(now) {
    var p = ((now - pStart) / 1000 % total) / total;
    prog.style.width = (p * 100).toFixed(2) + '%';
    requestAnimationFrame(pTick);
  })(performance.now());

  function replay() { if (timer) clearTimeout(timer); if (idx >= 0) scenes[idx].classList.remove('show'); idx = -1; pStart = performance.now(); show(0); }
  addEventListener('keydown', function (e) { if (e.key === 'r' || e.key === 'R') replay(); });
  show(0);
})();
</script>
</body>
</html>
